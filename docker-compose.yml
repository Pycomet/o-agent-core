services:
  o-agent-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: o-agent-core
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      
      # Trigger.dev Configuration
      - TRIGGER_API_KEY=${TRIGGER_API_KEY}
      - TRIGGER_API_URL=${TRIGGER_API_URL:-https://api.trigger.dev}
      
      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - o-agent-network

networks:
  o-agent-network:
    driver: bridge

